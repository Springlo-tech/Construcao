<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Casa AR - WebXR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- WebXR Hit Test Component -->
  <script src="https://unpkg.com/aframe-ar-hit-test@1.1.0/dist/aframe-ar-hit-test.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #ui {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      font-family: Arial, sans-serif;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="ui">Aponte para o chão e toque para posicionar a casa</div>

<a-scene
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  webxr="requiredFeatures: hit-test,local-floor"
  ar-hit-test="target:#reticle">

  <a-assets>
    <!-- SUA CASA EM ESCALA REAL -->
    <a-asset-item id="casa" src="src/glb/teste.glb"></a-asset-item>
  </a-assets>

  <!-- Câmera -->
  <a-camera
    position="0 1.6 0"
    look-controls
    wasd-controls="enabled: false">
  </a-camera>

  <!-- RETÍCULO VERDE (PLANO DETECTADO) -->
  <a-entity
    id="reticle"
    geometry="primitive: ring; radiusInner: 0.06; radiusOuter: 0.08"
    material="color: #00ff00; shader: flat"
    rotation="-90 0 0"
    visible="false">
  </a-entity>

  <!-- CASA -->
  <a-gltf-model
    id="casa-modelo"
    src="#casa"
    visible="false"
    scale="1 1 1">
  </a-gltf-model>

</a-scene>

<script>
  const reticle = document.querySelector('#reticle');
  const casa = document.querySelector('#casa-modelo');
  const ui = document.querySelector('#ui');

  document.body.addEventListener('click', () => {
    if (!reticle.object3D.visible) return;

    const pos = new THREE.Vector3();
    reticle.object3D.getWorldPosition(pos);

    casa.setAttribute('position', pos);
    casa.setAttribute('visible', true);

    ui.innerText = 'Casa posicionada em escala real';
  });
</script>

</body>
</html>
